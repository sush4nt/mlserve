# NYC Taxi Fare — regression (predict fare_amount in USD).
name: nyc_taxi
task: regression
target: fare_amount
mlflow_experiment: nyc-taxi-fare
registered_model_name: nyc-taxi-fare

py_endpoint: nyc-taxi-fare-py
onnx_endpoint: null   # no ONNX peer for the regressor; comparison story lives on Avazu

# Taxi feature engineering is custom (haversine + temporal), handled in code,
# so the generic encode lists are empty here.
drop_cols: [key]   # pickup_datetime is consumed then dropped by the engineer
freq_encode_cols: []
label_encode_cols: []

xgb_params:
  objective: "reg:squarederror"
  eval_metric: ["rmse"]
  max_depth: 8
  eta: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  tree_method: "hist"
  seed: 42
num_boost_round: 400
early_stopping_rounds: 30

form_fields:
  - {name: pickup_longitude,  label: "Pickup Longitude",  default: -73.985}
  - {name: pickup_latitude,   label: "Pickup Latitude",   default: 40.758}
  - {name: dropoff_longitude, label: "Dropoff Longitude",  default: -73.978}
  - {name: dropoff_latitude,  label: "Dropoff Latitude",   default: 40.751}
  - {name: passenger_count,   label: "Passengers",         default: 1, min: 1, max: 6}
  - {name: hour,              label: "Hour of Day",        default: 14, min: 0, max: 23}
