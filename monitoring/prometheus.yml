global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # The inference app exposes the rest_server_* metrics at /metrics.
  - job_name: "mlserve-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:8080"]   # Docker service name resolves on mlserve-net
        labels:
          service: mlserve

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
